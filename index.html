<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>منظومة مدرسة منير المدينة الذكية</title>
  
  <!-- ملف تعريف التطبيق للتثبيت الحقيقي -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="https://img.icons8.com/fluency/192/education.png">
  <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/education.png">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1e3d59">
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      background-color: #1e3d59; font-family: sans-serif;
    }
    /* عرض المنظومة بملء الشاشة وإخفاء أي هوامش أو أشرطة */
    iframe {
      width: 100%; height: 100%; border: none; display: block;
    }
    /* شريط التثبيت المنبثق */
    #install-banner {
      display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 450px; background: #1e3d59; color: white; padding: 15px;
      border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 99999;
      align-items: center; justify-content: space-between; direction: rtl;
    }
    #install-btn {
      background: #17b978; color: white; border: none; padding: 8px 16px;
      border-radius: 6px; font-weight: bold; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- شريط التثبيت الذكي -->
  <div id="install-banner">
    <div style="display: flex; align-items: center; gap: 10px;">
      <img src="https://img.icons8.com/fluency/48/education.png" style="width: 36px; height: 36px;">
      <div>
        <strong style="display:block; font-size: 14px;">تثبيت المنظومة على الجهاز</strong>
        <span style="font-size: 11px; color: #cbd5e1;">ثبت التطبيق للوصول السريع بدون متصفح</span>
      </div>
    </div>
    <button id="install-btn">تثبيت</button>
  </div>

  <!-- عرض المنظومة بملء الشاشة (iframe) لتجاوز شريط جوجل العلوي -->
  <iframe src="https://script.google.com/macros/s/AKfycbz_KJ3dkYBawjfYJCOwVSzePPLCemmj7cCxatMWKpvy6sZrnzdfd-vfjl4jneI0z3fbwg/exec"></iframe>

  <script>
    // تسجيل الـ Service Worker لتفعيل زر التثبيت إجبارياً في المتصفح
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker registered!', reg))
        .catch(err => console.log('Registration failed: ', err));
    });
  }
    let deferredPrompt;
    const banner = document.getElementById('install-banner');
    const btn = document.getElementById('install-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      banner.style.display = 'flex';
    });

    btn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          banner.style.display = 'none';
        }
        deferredPrompt = null;
      }
    });
  </script>
</body>
</html>
